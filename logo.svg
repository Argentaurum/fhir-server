<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">

  <!-- Background -->
  <rect width="120" height="120" rx="24" fill="#0d1b2a"/>

  <!-- Antenna stem -->
  <line x1="60" y1="13" x2="60" y2="19"
        stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Antenna: little red heart -->
  <path d="M 60,12 C 60,10 57.5,7.5 55,7.5 C 52.5,7.5 51,10 51,12
           C 51,15.5 60,20 60,20
           C 60,20 69,15.5 69,12
           C 69,10 67.5,7.5 65,7.5
           C 62.5,7.5 60,10 60,12 Z"
        fill="#f87171"/>

  <!-- Head (big + round for maximum cuteness) -->
  <rect x="13" y="20" width="94" height="50" rx="16" fill="#1e3a5f"/>

  <!-- Ear bolts -->
  <circle cx="13"  cy="43" r="6" fill="#152d4a" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="107" cy="43" r="6" fill="#152d4a" stroke="#22d3ee" stroke-width="1.5"/>

  <!-- Eyebrows (soft arched) -->
  <path d="M 27,30 Q 38,26 49,30"
        fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 71,30 Q 82,26 93,30"
        fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Eyes — big white sclera -->
  <circle cx="38" cy="42" r="13" fill="white"/>
  <circle cx="82" cy="42" r="13" fill="white"/>
  <!-- Eyes — cyan iris -->
  <circle cx="38" cy="42" r="9"  fill="#22d3ee"/>
  <circle cx="82" cy="42" r="9"  fill="#22d3ee"/>
  <!-- Eyes — dark pupil (slightly off-center for life) -->
  <circle cx="39.5" cy="42.5" r="5.5" fill="#0d1b2a"/>
  <circle cx="83.5" cy="42.5" r="5.5" fill="#0d1b2a"/>
  <!-- Eyes — big shine dot -->
  <circle cx="35"   cy="37"   r="2.5" fill="white"/>
  <circle cx="79"   cy="37"   r="2.5" fill="white"/>
  <!-- Eyes — small secondary shine -->
  <circle cx="42"   cy="46"   r="1.2" fill="white"/>
  <circle cx="86"   cy="46"   r="1.2" fill="white"/>

  <!-- Blush (rosy cheeks) -->
  <ellipse cx="20"  cy="56" rx="8" ry="5" fill="#fb7185" opacity="0.4"/>
  <ellipse cx="100" cy="56" rx="8" ry="5" fill="#fb7185" opacity="0.4"/>

  <!-- Sparkle near right eye (✨ touch) -->
  <line x1="97" y1="28" x2="97" y2="33" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="94.5" y1="30.5" x2="99.5" y2="30.5" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="104" y1="34" x2="106" y2="36" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

  <!-- Smile (big, expressive) -->
  <path d="M 43,58 Q 60,70 77,58"
        fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Arms (stubby + round) -->
  <rect x="8"  y="74" width="18" height="25" rx="9" fill="#1e3a5f"/>
  <rect x="94" y="74" width="18" height="25" rx="9" fill="#1e3a5f"/>
  <!-- Hands -->
  <circle cx="17"  cy="101" r="9" fill="#1e3a5f"/>
  <circle cx="103" cy="101" r="9" fill="#1e3a5f"/>

  <!-- Body -->
  <rect x="26" y="72" width="68" height="40" rx="13" fill="#1e3a5f"/>

  <!-- Stethoscope -->
  <path d="M 52,73 C 38,73 30,81 32,91 C 34,99 42,102 48,99"
        fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="48" cy="98" r="5"  fill="none" stroke="#94a3b8" stroke-width="2.5"/>
  <circle cx="48" cy="98" r="2"  fill="#94a3b8"/>

  <!-- Medical cross -->
  <rect x="63" y="82" width="16" height="6" rx="2" fill="#f87171"/>
  <rect x="68" y="77" width="6"  height="16" rx="2" fill="#f87171"/>

</svg>
